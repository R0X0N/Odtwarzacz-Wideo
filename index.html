<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Frame Extractor Web</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- JS Bundle z Popperem dla Modali -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="script.js" defer></script>
</head>
<body>

<div class="container-fluid py-4 h-100" style="height: 100vh;">
    <div class="row h-100">
        <!-- Lewa strona: Wideo i kontrole -->
        <div class="col-lg-8 d-flex flex-column h-100">
            <div class="studio-panel flex-grow-1 d-flex flex-column" style="min-height: 0;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="title-label m-0">Odtwarzacz Wideo</h5>
                    <div class="d-flex gap-2 align-items-center">
                        <span id="fileInfo" class="text-light-muted small">Wgraj plik (czekam...)</span>
                        <!-- DODANO OBSŁUGĘ .mkv -->
                        <input type="file" id="videoUploader" accept="video/mp4,video/x-m4v,video/x-matroska,.mkv,video/*" class="form-control form-control-sm w-auto custom-input">
                    </div>
                </div>
                
                <!-- Podgląd wideo -->
                <div class="video-wrapper mb-3 flex-grow-1" id="videoWrapper">
                    <video id="videoPlayer" playsinline></video>
                    
                    <!-- Nakładka renderowania ze statystykami -->
                    <div id="processingOverlay" style="display: none;">
                        <div class="spinner-border mb-2" style="width: 3rem; height: 3rem; color: #43A047;" role="status"></div>
                        <h4 style="font-weight: bold; color: #A3BE8C;">Generowanie klatek...</h4>
                        
                        <h1 id="percentText" style="color: #4CAF50; font-family: 'Consolas', monospace; font-weight: bold; font-size: 3.5rem; margin-bottom: 0;">0%</h1>
                        <h5 id="progressText" style="color: #FDD835; font-family: 'Consolas', monospace; font-weight: bold; margin-bottom: 15px;">0 / 0 klatek</h5>
                    </div>
                </div>

                <!-- Przyciski przewijania -->
                <div class="d-flex justify-content-center align-items-center gap-2 mb-2">
                    <button class="btn btn-secondary btn-skip" onclick="skipFrames(-10)">-10</button>
                    <button class="btn btn-secondary btn-skip" onclick="skipFrames(-5)">-5</button>
                    <button class="btn btn-secondary btn-skip" onclick="skipFrames(-1)">-1</button>
                    
                    <button class="btn btn-primary mx-2" id="playBtn" onclick="togglePlay()">▶ Odtwarzaj</button>
                    
                    <button class="btn btn-secondary btn-skip" onclick="skipFrames(1)">+1</button>
                    <button class="btn btn-secondary btn-skip" onclick="skipFrames(5)">+5</button>
                    <button class="btn btn-secondary btn-skip" onclick="skipFrames(10)">+10</button>
                </div>

                <!-- Wycentrowany czas -->
                <div class="text-center mb-3">
                    <span class="time-label text-white" id="timeLabel">00:00.00 / 00:00.00</span>
                </div>

                <!-- Pasek I/O i Napisy docinania -->
                <div class="d-flex justify-content-between align-items-end mb-2">
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn btn-warning" onclick="setInPoint()" title="Ustaw klatkę początkową (I)">[ I</button>
                        <button class="btn btn-warning" onclick="setOutPoint()" title="Ustaw klatkę końcową (O)">O ]</button>
                        <button class="btn btn-success ms-2" id="actionRangeBtn" onclick="handleAddRange()">Dodaj zakres ➕</button>
                    </div>
                    <div class="text-end" style="color: #A0AAB5; font-family: 'Consolas', monospace; font-size: 14px;" id="trimLabel">
                        Docinanie: Brak
                    </div>
                </div>
            </div>
        </div>

        <!-- Prawa strona: Lista obszarów -->
        <div class="col-lg-4 d-flex flex-column h-100">
            <div class="studio-panel flex-grow-1 d-flex flex-column" style="min-height: 0;">
                <h5 class="title-label" style="color: #8EB2D6;">Zaznaczone Zakresy</h5>
                <p class="text-light-muted small">Kliknij nazwę ujęcia, aby ją zmienić. Użyj klawiszy I oraz O do zaznaczania.</p>
                
                <div id="rangesList" class="flex-grow-1 overflow-auto mb-3 text-white">
                    <!-- Tutaj pojawią się zakresy -->
                </div>

                <div class="mt-auto">
                    <label class="text-light-muted small mb-1 text-white">Co którą klatkę zapisać? (1 = każda z zakresu):</label>
                    <input type="number" id="frameStep" class="form-control mb-4" value="1" min="1" step="1">

                    <button class="btn btn-success w-100 py-3" onclick="processVideo()" id="processBtn">
                        Wybierz folder i Zapisz klatki
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL BOOTSTRAP: Do wprowadzania nazw ujęć -->
<div class="modal fade" id="nameModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title">Nazwa Zakresu</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body py-4">
                <label class="mb-2 d-block">Podaj nazwę dla wybranego ujęcia:</label>
                <input type="text" id="modalInput" class="form-control bg-secondary text-white border-0" placeholder="Np. Ujecie_01">
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Anuluj</button>
                <button type="button" class="btn btn-primary" id="modalSaveBtn">Zapisz</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
